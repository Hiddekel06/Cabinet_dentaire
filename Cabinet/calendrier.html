<!-- calendar.html -->
<div class="glass-card p-6">
  <div class="flex justify-between items-center mb-6">
    <h3 class="text-xl font-bold text-gray-800">Calendrier des Rendez-vous</h3>
    <div class="flex space-x-3">
      <button class="px-4 py-2 bg-teal-600 text-white rounded-lg">
        <i class="fas fa-plus mr-2"></i>Nouveau RDV
      </button>
      <select class="border rounded-lg px-3">
        <option>Vue Jour</option>
        <option>Vue Semaine</option>
        <option>Vue Mois</option>
      </select>
    </div>
  </div>
  
  <!-- Calendrier interactif -->
  <div class="grid grid-cols-7 gap-2 mb-4">
    <div class="text-center font-medium text-gray-500 p-2">Lun</div>
    <div class="text-center font-medium text-gray-500 p-2">Mar</div>
    <!-- ... -->
  </div>
  
  <!-- Liste des RDV du jour -->
  <div class="space-y-3">
    <div class="flex items-center p-4 border-l-4 border-teal-500 bg-teal-50">
      <div class="w-16 text-center">
        <div class="font-bold text-gray-800">09:00</div>
        <div class="text-sm text-gray-500">60 min</div>
      </div>
      <div class="ml-4 flex-1">
        <div class="font-medium">Awa Diop - Détartrage</div>
        <div class="text-sm text-gray-500">Salle 1 - Dr. Ndiaye</div>
      </div>
      <span class="badge bg-green-100 text-green-800">Confirmé</span>
    </div>
  </div>
</div>
